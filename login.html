<!DOCTYPE html5>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login-title">تسجيل دخول - Team Work</title>

    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/cario.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="bg-light">
    <header class="container-fluid login-header">
        <a href="index.html" class="back-arrow">
            <i class="fa fa-long-arrow-right" style="color: #8205f7;" aria-hidden="true"></i>
        </a>
        <div class="brand-name">Team Work</div>

    </header>
    <div class="container login-box">
            <div class="col-xs-12">
                
                <div class="panel panel-default login-card">
                    <div class="panel-body p-4">
                        <h3 class="text-center login-title" data-i18n="title">تسجيل الدخول إلى تيم وورك</h3>
                        
                        <form id="loginForm">
                            <div class="form-group">
                                <label class="control-label text-muted" data-i18n="email">البريد الإلكتروني</label>
                                <div class="input-group custom-input-group">
                                    <span><i class="fa fa-envelope-o" aria-hidden="true"></i></span>
                                    <input type="email" id="email" class="form-control input-custom" data-i18n-placeholder="email_placeholder" placeholder="أدخل بريدك الإلكتروني" required>
                                </div>
                            </div>

                            <div class="form-group mb-1">
                                <label class="control-label text-muted" data-i18n="password">كلمة المرور</label>
                                <div class="input-group custom-input-group">
                                    <span><i class="fa fa-unlock-alt" aria-hidden="true"></i></span>
                                    <input type="password" id="password" class="form-control input-custom" data-i18n-placeholder="password_placeholder" placeholder="أدخل كلمة المرور" required>
                                    <span class="toggle-pass-addon" id="togglePassword"><i class="fa fa-eye" aria-hidden="true"></i></span>
                                </div>
                            </div>

                            <div class="text-left forgot-pass-div">
                                <a href="#" class="text-purple small-link" data-i18n="forget-password">نسيت كلمة المرور؟</a>
                            </div>

                            <button type="submit" class="btn btn-purple btn-block btn-lg btn-submit" data-i18n="next">متابعة</button>

                            <div class="text-center text-muted register-redirect">
                                <span data-i18n="acount-check">ليس لديك حساب؟</span> 
                                <a href="register.html" class="text-purple fw-bold" data-i18n="acount-create">إنشاء حساب</a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
    </div>


    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/login.js"></script>
    <script src="js/i18n.js"></script>
</body>
</html>
